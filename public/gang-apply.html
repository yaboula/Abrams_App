<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABRAMS RP — GANG MATRIX</title>
  <meta name="description" content="Terminal de aplicación de facción criminal — Abrams RP">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/gang.css">
</head>
<body spellcheck="false" autocomplete="off">
  <!-- ═══ ATMOSPHERIC BACKGROUND ═══ -->
  <div class="atmos-layer">
    <div class="atmos-nebula"></div>
    <div class="atmos-grid"></div>
  </div>
  <canvas id="particleCanvas"></canvas>

  <!-- ═══ MAIN SCENE ═══ -->
  <div class="scene" id="scene">

    <!-- ─── HEADER BAR ─── -->
    <header class="hud-header">
      <div class="hud-left">
        <div class="hud-ring">
          <div class="hud-ring-core"></div>
        </div>
        <div class="hud-brand">
          <span class="hud-tag" data-i18n="header.tag">ABRAMS RP // SINDICATO</span>
          <span class="hud-title"><span data-i18n="header.title_1">GANG</span> <span class="text-accent" data-i18n="header.title_2">MATRIX</span></span>
        </div>
      </div>
      <div class="hud-right">
        <!-- I18N SWITCHER -->
        <div class="lang-switcher">
          <button class="lang-btn active" data-lang="es">ES</button>
          <button class="lang-btn" data-lang="en">EN</button>
          <button class="lang-btn" data-lang="fr">FR</button>
        </div>
        <div class="hud-progress-container">
          <div class="hud-progress-bar" id="hudProgressBar"></div>
        </div>
        <span class="hud-status-text" id="hudStatusText" data-i18n="header.status_incomplete">DOSSIER INCOMPLETO</span>
        <span class="hud-counter" id="headerCounter">0 / 6</span>
      </div>
    </header>

    <!-- ─── DATA CABLES SVG ─── -->
    <svg class="cable-layer" id="cableLayer" preserveAspectRatio="none">
      <defs>
        <filter id="cableGlow">
          <feGaussianBlur stdDeviation="3" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>

    <!-- ─── HOLOGRAM CORE ─── -->
    <div class="holo-hub" id="holoHub">
      <div class="holo-core" id="holoCore">
        <!-- Logo watermark -->
        <img class="holo-logo" src="/assets/logo1.png" alt="" draggable="false">
        <!-- Rotating wireframe rings -->
        <div class="holo-ring holo-ring-1"></div>
        <div class="holo-ring holo-ring-2"></div>
        <div class="holo-ring holo-ring-3"></div>
        <div class="holo-ring holo-ring-4"></div>
        <div class="holo-inner-core"></div>
        <!-- Evolution overlays -->
        <div class="holo-evo holo-evo-grid" id="holoEvoGrid"></div>
        <div class="holo-evo holo-evo-nodes" id="holoEvoNodes"></div>
      </div>
      <div class="holo-status-wrapper">
        <div class="holo-status-fill" id="holoStatusFill"></div>
        <div class="holo-status-text" id="holoStatus" data-i18n="header.status_blank">[ ESTADO: DOSSIER EN BLANCO ]</div>
      </div>
    </div>

    <!-- ─── ORBITAL PLATES (6 Nodes) ─── -->
    <div class="orbital-ring" id="orbitalRing">
      <button class="orbital-plate" id="node-1" data-node="1">
        <div class="plate-inner">
          <div class="plate-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Z"/><path d="M20 21a8 8 0 0 0-16 0"/></svg></div>
          <div class="plate-label" data-i18n="nodes.n1_title">OPERADOR</div>
          <div class="plate-sub" data-i18n="nodes.n1_sub">Datos OOC del operador</div>
          <div class="plate-status" id="status-1">
            <span class="ps-icon">?</span>
            <span class="ps-text" data-i18n="nodes.pending">PENDIENTE</span>
          </div>
        </div>
        <div class="plate-corner"></div>
      </button>

      <button class="orbital-plate" id="node-2" data-node="2">
        <div class="plate-inner">
          <div class="plate-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg></div>
          <div class="plate-label" data-i18n="nodes.n2_title">IDENTIDAD</div>
          <div class="plate-sub" data-i18n="nodes.n2_sub">Lore y tipología IC</div>
          <div class="plate-status" id="status-2">
            <span class="ps-icon">?</span>
            <span class="ps-text" data-i18n="nodes.pending">PENDIENTE</span>
          </div>
        </div>
        <div class="plate-corner"></div>
      </button>

      <button class="orbital-plate" id="node-3" data-node="3">
        <div class="plate-inner">
          <div class="plate-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a4 4 0 0 0-8 0v2"/><circle cx="12" cy="14" r="2"/></svg></div>
          <div class="plate-label" data-i18n="nodes.n3_title">LOGÍSTICA</div>
          <div class="plate-sub" data-i18n="nodes.n3_sub">Economía y recursos</div>
          <div class="plate-status" id="status-3">
            <span class="ps-icon">?</span>
            <span class="ps-text" data-i18n="nodes.pending">PENDIENTE</span>
          </div>
        </div>
        <div class="plate-corner"></div>
      </button>

      <button class="orbital-plate" id="node-4" data-node="4">
        <div class="plate-inner">
          <div class="plate-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 0 0-8 8c0 5.4 7 12 8 12s8-6.6 8-12a8 8 0 0 0-8-8Z"/></svg></div>
          <div class="plate-label" data-i18n="nodes.n4_title">TÁCTICA</div>
          <div class="plate-sub" data-i18n="nodes.n4_sub">Zona de operaciones</div>
          <div class="plate-status" id="status-4">
            <span class="ps-icon">?</span>
            <span class="ps-text" data-i18n="nodes.pending">PENDIENTE</span>
          </div>
        </div>
        <div class="plate-corner"></div>
      </button>

      <button class="orbital-plate" id="node-5" data-node="5">
        <div class="plate-inner">
          <div class="plate-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
          <div class="plate-label" data-i18n="nodes.n5_title">ESCUADRA</div>
          <div class="plate-sub" data-i18n="nodes.n5_sub">Roster y jerarquía</div>
          <div class="plate-status" id="status-5">
            <span class="ps-icon">?</span>
            <span class="ps-text" data-i18n="nodes.pending">PENDIENTE</span>
          </div>
        </div>
        <div class="plate-corner"></div>
      </button>

      <button class="orbital-plate" id="node-6" data-node="6">
        <div class="plate-inner">
          <div class="plate-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
          <div class="plate-label" data-i18n="nodes.n6_title">PROTOCOLO</div>
          <div class="plate-sub" data-i18n="nodes.n6_sub">Diplomacia y normas</div>
          <div class="plate-status" id="status-6">
            <span class="ps-icon">?</span>
            <span class="ps-text" data-i18n="nodes.pending">PENDIENTE</span>
          </div>
        </div>
        <div class="plate-corner"></div>
      </button>
    </div>

    <!-- ─── ENERGY BEAM SVG OVERLAY ─── -->
    <svg class="beam-layer" id="beamLayer" viewBox="0 0 1920 1080" preserveAspectRatio="none">
      <defs>
        <filter id="beamGlow">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
    </svg>

    <!-- ─── CLIMAX TRANSMIT BUTTON ─── -->
    <div class="climax-container" id="climaxContainer">
      <button class="btn-climax" id="btnTransmit" disabled>
        <span class="climax-glow"></span>
        <span class="climax-text" id="climaxText" data-i18n="header.transmit_btn">ENCRIPTAR Y TRANSMITIR DOSSIER</span>
      </button>
    </div>
  </div>

  <!-- ═══ MODAL OVERLAY ═══ -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-container" id="modalContainer">
      <div class="modal-header">
        <div class="modal-header-left">
          <span class="modal-tag">NODO DE DATOS</span>
          <h2 class="modal-title" id="modalTitle"></h2>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Cerrar">
          <span class="close-line"></span>
          <span class="close-line"></span>
        </button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer">
        <button class="btn-save" id="btnSave">
          <span class="save-icon">◎</span>
          <span data-i18n="modals.save_btn">GUARDAR Y ENCRIPTAR</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ═══ SUCCESS OVERLAY ═══ -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-content">
      <div class="success-icon">✓</div>
      <h2 class="success-title" data-i18n="success.title">DOSSIER TRANSMITIDO</h2>
      <p class="success-desc" data-i18n="success.description">Encriptación completa. Esperando revisión del alto mando.</p>
    </div>
  </div>

  <!-- ═══ SCRIPTS ═══ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/gang.js"></script>
</body>
</html>
