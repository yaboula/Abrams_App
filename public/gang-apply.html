<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Abrams RP — Sistema de Aplicación de Organización Criminal. Completa tu dossier táctico.">
  <title>ABRAMS RP — GANG MATRIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/gang.css">
</head>
<body>

  <!-- ═══ BACKGROUND ═══ -->
  <div class="gang-bg"></div>
  <div class="gang-overlay"></div>
  <div class="gang-grid-pattern"></div>

  <!-- ═══ MAIN DASHBOARD ═══ -->
  <main class="dashboard" id="dashboard">

    <!-- Header -->
    <header class="dash-header">
      <div class="dash-header-left">
        <div class="status-ring">
          <div class="status-core"></div>
        </div>
        <div class="dash-brand">
          <span class="brand-tag">ABRAMS RP // SINDICATO</span>
          <h1 class="brand-title">GANG <span class="text-accent">MATRIX</span></h1>
        </div>
      </div>
      <div class="dash-header-right">
        <span class="header-status-text">DOSSIER INCOMPLETO</span>
        <span class="header-counter" id="headerCounter">0 / 6</span>
      </div>
    </header>

    <!-- 6-Node Grid -->
    <section class="node-grid" id="nodeGrid">

      <button class="node-card" data-node="1" id="node-1">
        <div class="node-number">01</div>
        <div class="node-content">
          <h3 class="node-title">OPERADOR OOC</h3>
          <p class="node-desc">Datos fuera de personaje del operador principal</p>
        </div>
        <div class="node-status" id="status-1">
          <span class="status-icon">?</span>
          <span class="status-label">PENDIENTE</span>
        </div>
        <div class="node-corner"></div>
      </button>

      <button class="node-card" data-node="2" id="node-2">
        <div class="node-number">02</div>
        <div class="node-content">
          <h3 class="node-title">IDENTIDAD & LORE IC</h3>
          <p class="node-desc">Historia, tipo y manifiesto de la organización</p>
        </div>
        <div class="node-status" id="status-2">
          <span class="status-icon">?</span>
          <span class="status-label">PENDIENTE</span>
        </div>
        <div class="node-corner"></div>
      </button>

      <button class="node-card" data-node="3" id="node-3">
        <div class="node-number">03</div>
        <div class="node-content">
          <h3 class="node-title">LOGÍSTICA & ECONOMÍA</h3>
          <p class="node-desc">Distribución de recursos y especialización criminal</p>
        </div>
        <div class="node-status" id="status-3">
          <span class="status-icon">?</span>
          <span class="status-label">PENDIENTE</span>
        </div>
        <div class="node-corner"></div>
      </button>

      <button class="node-card" data-node="4" id="node-4">
        <div class="node-number">04</div>
        <div class="node-content">
          <h3 class="node-title">MAPA TÁCTICO</h3>
          <p class="node-desc">Territorio reclamado y coordenadas de operación</p>
        </div>
        <div class="node-status" id="status-4">
          <span class="status-icon">?</span>
          <span class="status-label">PENDIENTE</span>
        </div>
        <div class="node-corner"></div>
      </button>

      <button class="node-card" data-node="5" id="node-5">
        <div class="node-number">05</div>
        <div class="node-content">
          <h3 class="node-title">ESCUADRA / ROSTER</h3>
          <p class="node-desc">Miembros activos y estructura jerárquica</p>
        </div>
        <div class="node-status" id="status-5">
          <span class="status-icon">?</span>
          <span class="status-label">PENDIENTE</span>
        </div>
        <div class="node-corner"></div>
      </button>

      <button class="node-card" data-node="6" id="node-6">
        <div class="node-number">06</div>
        <div class="node-content">
          <h3 class="node-title">DIPLOMACIA & NORMAS</h3>
          <p class="node-desc">Postura de alianzas y aceptación del protocolo</p>
        </div>
        <div class="node-status" id="status-6">
          <span class="status-icon">?</span>
          <span class="status-label">PENDIENTE</span>
        </div>
        <div class="node-corner"></div>
      </button>

    </section>

    <!-- TRANSMITIR DOSSIER Button -->
    <footer class="dash-footer" id="dashFooter">
      <div class="transmit-lock" id="transmitLock">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        <span>SISTEMA BLOQUEADO — COMPLETA TODOS LOS NODOS</span>
      </div>
      <button class="btn-transmit" id="btnTransmit" disabled>
        <span class="transmit-text">TRANSMITIR DOSSIER</span>
        <div class="transmit-glow"></div>
      </button>
    </footer>

  </main>

  <!-- ═══ MODAL OVERLAY ═══ -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-container" id="modalContainer">

      <!-- Modal Header -->
      <div class="modal-header">
        <div class="modal-header-left">
          <span class="modal-tag">NODO DE DATOS</span>
          <h2 class="modal-title" id="modalTitle">—</h2>
        </div>
        <button class="modal-close" id="modalClose" aria-label="Cerrar modal">
          <span class="close-line"></span>
          <span class="close-line"></span>
        </button>
      </div>

      <!-- Modal Body (content injected here per-node) -->
      <div class="modal-body" id="modalBody">
        <!-- Sprint 2-4 will populate this -->
      </div>

      <!-- Modal Footer -->
      <div class="modal-footer">
        <button class="btn-save" id="btnSave">
          <span class="save-icon">⬡</span>
          <span class="save-text">GUARDAR Y ENCRIPTAR</span>
        </button>
      </div>

    </div>
  </div>

  <!-- ═══ SUCCESS OVERLAY (Sprint 5) ═══ -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-content">
      <div class="success-ring-container">
        <svg class="success-ring-svg" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(230,57,70,0.2)" stroke-width="2"/>
          <circle cx="60" cy="60" r="54" fill="none" stroke="#E63946" stroke-width="2" stroke-dasharray="340" stroke-dashoffset="340" class="success-circle-fill"/>
        </svg>
        <div class="success-check-icon">✓</div>
      </div>
      <h2 class="success-title">TRANSMISIÓN COMPLETADA</h2>
      <p class="success-subtitle">DOSSIER EN MANOS DEL SINDICATO</p>
    </div>
  </div>

  <!-- ═══ SCRIPTS ═══ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/gang.js"></script>

</body>
</html>
